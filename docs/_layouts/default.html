<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07182D">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    {% include header.html %}

    <main class="page">
      <article class="prose">
        {% if page.title %}
          <header class="page-header">
            <p class="eyebrow">{{ page.eyebrow | default: "Documentation" }}</p>
            <h1>{{ page.title }}</h1>
            {% if page.summary %}<p class="lede">{{ page.summary }}</p>{% endif %}
          </header>
        {% endif %}

        {{ content }}

        <footer class="page-footer">
          {% if site.repo %}
            <a class="edit-link" href="https://github.com/{{ site.repo.owner }}/{{ site.repo.name }}/edit/{{ site.repo.branch }}/docs/{{ page.path | remove_first: 'docs/' }}">Edit this page on GitHub</a>
          {% endif %}
        </footer>
      </article>
    </main>

    {% include footer.html %}
  </body>
</html>
